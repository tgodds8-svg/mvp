<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo RPG — Create Hero</title>
<style>
:root{--bg:#1a1a2e;--panel:#16213e;--accent:#e94560;--text:#eaeaea;--muted:#a0a0a0;--good:#2ecc71;}
*{box-sizing:border-box;font-family:'Courier New',Courier,monospace;}
body{background:var(--bg);color:var(--text);margin:0;padding:2rem;min-height:100vh;}
h1{text-align:center;font-size:2.5rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:3px;}
.subtitle{text-align:center;color:var(--muted);margin-bottom:2rem;}
.container{max-width:600px;margin:0 auto;background:var(--panel);padding:2rem;border-radius:8px;border:2px solid #0f3460;}
h2{color:var(--accent);margin-top:0;}
.section{margin-bottom:1.5rem;}
.section-title{color:var(--accent);font-weight:bold;margin-bottom:.5rem;font-size:1.1rem;}
label{display:block;margin-top:.5rem;color:var(--muted);font-size:.9rem;}
input,select{width:100%;padding:.5rem;background:#0f3460;border:1px solid var(--accent);color:var(--text);border-radius:4px;font-family:inherit;margin-top:.3rem;}
input:focus,select:focus{outline:none;border-color:#ff6b81;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.row>div{display:flex;flex-direction:column;}
.stat-display{display:grid;grid-template-columns:repeat(6,1fr);gap:.5rem;margin-top:.5rem;}
.stat-box{background:#0f1a30;padding:.8rem;border-radius:4px;text-align:center;border-left:3px solid var(--accent);}
.stat-label{font-size:.75rem;color:var(--muted);margin-bottom:.2rem;}
.stat-value{font-size:1.2rem;font-weight:bold;color:var(--good);}
button{display:inline-block;background:var(--accent);color:#fff;padding:.7rem 1.5rem;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:1rem;margin-top:1rem;}
button:hover{background:#ff6b81;}
.back{background:#0f3460;color:var(--accent);margin-right:.5rem;}
.back:hover{background:#1a5078;}
.gear-item{display:flex;gap:.5rem;align-items:center;margin-top:.3rem;}
.gear-item input{flex:1;}
.gear-item button{padding:.3rem .6rem;font-size:.8rem;margin:0;}
#gearList{list-style:none;padding:0;}
#gearList li{background:#0f1a30;padding:.5rem;margin-top:.3rem;border-radius:4px;display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<h1>⚔️ Solo RPG</h1>
<p class="subtitle">Create Your Hero</p>

<div class="container">
  <div class="section">
    <label>Hero Name</label>
    <input type="text" id="heroName" placeholder="What is your name?">
  </div>

  <div class="section">
    <label>Class</label>
    <select id="heroClass" onchange="updateStats()">
      <option value="Fighter">Fighter (STR bonus)</option>
      <option value="Wizard">Wizard (INT bonus)</option>
      <option value="Rogue">Rogue (DEX bonus)</option>
      <option value="Cleric">Cleric (WIS bonus)</option>
    </select>
  </div>

  <div class="section">
    <label>Difficulty Tier</label>
    <select id="tierDisplay">
      <option>Calculating...</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Attributes</div>
    <div class="stat-display" id="statDisplay"></div>
  </div>

  <div class="section">
    <label>Starting Gear (add items)</label>
    <div class="gear-item">
      <input type="text" id="gearInput" placeholder="e.g., Longsword, Shield">
      <button style="margin:0;padding:.3rem .6rem;font-size:.8rem;" onclick="addGear()">+</button>
    </div>
    <ul id="gearList"></ul>
  </div>

  <div style="text-align:center;">
    <button class="back" onclick="window.location.href='index.html'">Back</button>
    <button onclick="rollHero()">🎲 Roll & Start Adventure</button>
  </div>
</div>

<script>
const campaignId = localStorage.getItem('srpg_active');
let campaigns = JSON.parse(localStorage.getItem('srpg_campaigns')||'[]');
let campaign = campaigns.find(c=>c.id===campaignId);
if(!campaign){ alert('No active campaign. Start one from the hub.'); window.location.href='index.html'; }

let currentGear = [];

function d(n){ return Math.floor(Math.random()*n)+1; }

function rollStats(){
  let stats = {};
  const attrs = ['STR','DEX','CON','INT','WIS','CHA'];
  
  if(campaign.tier==='novice'){
    attrs.forEach(attr => { stats[attr] = 3 + d(6); });
  } else if(campaign.tier==='veteran'){
    const rolls = [];
    for(let i=0;i<4;i++) rolls.push(d(6));
    rolls.sort((a,b)=>b-a);
    attrs.forEach((attr,i) => { stats[attr] = 3 + rolls[i]; });
  } else if(campaign.tier==='legend'){
    stats.STR = 8; stats.DEX = 7; stats.CON = 7; stats.INT = 6; stats.WIS = 6; stats.CHA = 5;
  }
  
  return stats;
}

function updateStats(){
  const stats = rollStats();
  document.getElementById('statDisplay').innerHTML = Object.entries(stats).map(([k,v]) => 
    `<div class="stat-box"><div class="stat-label">${k}</div><div class="stat-value">${v}</div></div>`
  ).join('');
}

function addGear(){
  const input = document.getElementById('gearInput');
  const item = input.value.trim();
  if(!item) return;
  currentGear.push(item);
  input.value = '';
  renderGear();
}

function removeGear(idx){
  currentGear.splice(idx,1);
  renderGear();
}

function renderGear(){
  const list = document.getElementById('gearList');
  list.innerHTML = currentGear.map((item,i) => 
    `<li>${item} <button style="background:#c0392b;padding:.2rem .4rem;font-size:.7rem;" onclick="removeGear(${i})">✕</button></li>`
  ).join('');
}

function rollHero(){
  const name = document.getElementById('heroName').value.trim();
  if(!name){ alert('Give your hero a name!'); return; }
  
  const heroClass = document.getElementById('heroClass').value;
  const stats = rollStats();
  const hp = (campaign.tier==='legend' ? 12 : campaign.tier==='veteran' ? 8 : 6) + Math.floor((stats.CON-10)/2);
  const ac = 10 - Math.floor((stats.DEX-10)/2);
  const thac0 = 20 - Math.floor((stats.STR-10)/2);
  
  const hero = {
    name, class:heroClass, level:1, xp:0, hp:Math.max(1,hp), maxHp:Math.max(1,hp),
    ac, thac0, STR:stats.STR, DEX:stats.DEX, CON:stats.CON, INT:stats.INT, WIS:stats.WIS, CHA:stats.CHA,
    gear: currentGear.length ? currentGear : ['Dagger', 'Rope', 'Torch']
  };
  
  campaign.hero = hero;
  const idx = campaigns.findIndex(c=>c.id===campaignId);
  campaigns[idx] = campaign;
  localStorage.setItem('srpg_campaigns', JSON.stringify(campaigns));
  
  window.location.href = 'play.html';
}

document.getElementById('tierDisplay').value = campaign.tier;
updateStats();
</script>
</body>
</html>
